<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>線上圖書館管理系統</title>
    <link rel="stylesheet" href="/static/library/style.css?v=20260426b">
</head>
<body>
    <main class="page-shell">
        <section class="hero-card">
            <div>
                <p class="eyebrow">Online Library Console</p>
                <h1>線上圖書館管理系統</h1>
                <p class="hero-copy">
                    使用個人帳號登入後，即可查看自己的借閱狀態、借書、還書，並透過客服 Chatbot 詢問系統規則。
                </p>
            </div>
            <div class="hero-panel">
                <label>目前登入者</label>
                <p id="userName" class="hero-user-name">載入中...</p>
                <p id="userSummary" class="muted-text">正在讀取借閱資訊...</p>
                <form action="/logout/" method="post">
                    {% csrf_token %}
                    <button type="submit" class="ghost-btn">登出</button>
                </form>
            </div>
        </section>

        <section class="dashboard-grid">
            <section class="card">
                <div class="section-head">
                    <h2>圖書館書單</h2>
                    <button id="refreshBooksBtn" class="ghost-btn">重新整理</button>
                </div>
                <div id="booksContainer" class="book-grid"></div>
            </section>

            <section class="card">
                <div class="section-head">
                    <h2>我的借閱紀錄</h2>
                    <button id="refreshLoansBtn" class="ghost-btn">更新狀態</button>
                </div>
                <div id="loansContainer" class="loan-list"></div>
            </section>
        </section>

        <section class="card chatbot-card">
            <div class="section-head">
                <h2>客服 Chatbot</h2>
                <span id="chatbotModeTag" class="tag">模式載入中</span>
            </div>
            <div id="chatMessages" class="chat-messages">
                <div class="message bot">
                    你好，我可以回答借書規則、逾期狀態、還書流程，也能結合你目前的借閱資料提供提醒。
                </div>
            </div>
            <form id="chatForm" class="chat-form">
                <input id="chatInput" type="text" placeholder="例如：我的書什麼時候到期？">
                <button type="submit">送出</button>
            </form>
        </section>
    </main>

    <script src="/static/library/app.js?v=20260426b"></script>
</body>
</html>
